<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Product Inventory Dashboard</h1>

    <!--Controls -->

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search product">

        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <label>
            <input type="checkbox" id="lowStockFilter"> Low Stock (<5) </label>

                <select id="sortBy">
                    <option value="priceLowToHigh">Price Low → High</option>
                    <option value="priceHighToLow">Price High → Low</option>
                    <option value="nameAZ">Name A-Z</option>
                    <option value="nameZA">Name Z-A</option>
                </select>
    </div>

    <!-- Analytics -->
    <div class="analytics">
        <p>Total Products: <span id="totalProductsValue">0</span></p>
        <p>Total Value: <span id="totalInventoryValue">₹0</span></p>
        <p>Out of Stock: <span id="outOfStockValue">0</span></p>
    </div>

    <!-- Product Container -->
    <div id="productGrid"></div>

    <!-- Pagination -->
    <div id="pagination">
        <button disabled>Prev</button>
        <button>Next</button>
    </div>

    <!--Add Product -->
    <h2>Add Product</h2>
    <div class="form">
        <input type="text" id="productName" placeholder="Name">
        <input type="number" id="productPrice" placeholder="Price">
        <input type="number" id="productStock" placeholder="Stock">

        <select id="productCategory">
            <option value="">Select Category</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
        </select>

        <button onclick="addProduct()">Add Product</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
