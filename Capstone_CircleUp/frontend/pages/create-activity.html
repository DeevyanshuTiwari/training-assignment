<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Activity - CircleUp</title>

    <!-- CSS Imports -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/activity.css">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="dashboard-body">

<!-- Sidebar Navigation -->
<aside class="sidebar glass-panel">
    <div class="sidebar-brand">
        <i class="ph ph-circles-three-plus"></i>
        <h2>CircleUp</h2>
    </div>

    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="ph ph-squares-four"></i> Dashboard
        </a>
        <a href="browse.html" class="nav-item">
            <i class="ph ph-compass"></i> Browse Activities
        </a>
        <a href="my-activities.html" class="nav-item">
            <i class="ph ph-calendar-check"></i> My Activities
        </a>
        <a href="create-activity.html" class="nav-item active">
            <i class="ph ph-plus-circle"></i> Create Activity
        </a>
        <a href="profile.html" class="nav-item">
            <i class="ph ph-user"></i> Profile
        </a>
    </nav>

    <div class="sidebar-footer">
        <button id="btn-logout" class="btn btn-outline btn-full">
            <i class="ph ph-sign-out"></i> Logout
        </button>
    </div>
</aside>

<!-- Main Content Area -->
<main class="dashboard-main">
    <!-- Topbar -->
    <header class="dashboard-topbar">
        <div class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" placeholder="Search activities, categories...">
        </div>

        <div class="user-profile-mini">
            <div class="notification-bell">
                <i class="ph ph-bell"></i>
                <span class="badge">3</span>
            </div>
            <div class="avatar" id="user-avatar-mini">CU</div>
        </div>
    </header>

    <!-- Create Activity Content -->
    <div class="dashboard-content">
        <div class="section-header">
            <h2>Host an Activity</h2>
            <p>Fill out the details below to publish your event to the community.</p>
        </div>

        <div class="activity-form-container glass-panel">
            <form id="create-activity-form" class="activity-form">
                <div id="activity-alert" class="form-error hidden" style="width: 100%;"></div>

                <div class="form-group full-width">
                    <label for="act-title">Activity Title</label>
                    <input type="text" id="act-title" required placeholder="e.g., Weekend Morning Hike">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="act-category">Category</label>
                        <select id="act-category" required class="custom-select">
                            <option value="" disabled selected>Select a category</option>
                            <option value="Sports">Sports & Outdoors</option>
                            <option value="Tech">Tech & Coding</option>
                            <option value="Arts">Arts & Culture</option>
                            <option value="Music">Music</option>
                            <option value="Social">Social</option>
                            <option value="Education">Education</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="act-location">Location / Venue</label>
                        <input type="text" id="act-location" required placeholder="e.g., Central Park">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="act-date">Date</label>
                        <input type="date" id="act-date" required>
                    </div>
                    <div class="form-group">
                        <label for="act-time">Time</label>
                        <input type="time" id="act-time" required>
                    </div>
                    <div class="form-group">
                        <label for="act-max">Max Participants</label>
                        <input type="number" id="act-max" min="2" max="1000" required placeholder="e.g., 10">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="act-description">Detailed Description</label>
                    <textarea id="act-description" rows="5" required placeholder="Describe what attendees can expect, what to bring, etc."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-create-activity">
                        <span class="btn-text">Publish Activity</span>
                        <div class="spinner hidden" style="width:16px; height:16px; border-width:2px;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<!-- Scripts -->
<script type="module" src="../assets/js/create-activity.js"></script>
</body>
</html>
