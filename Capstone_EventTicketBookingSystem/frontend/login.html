<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - AuthApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<!-- Centered card wrapper -->
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Left decorative panel -->
        <div class="card-left">
            <div class="branding-content">
                <div class="logo">A</div>
                <h1>Welcome Back!</h1>
                <p>Access your account to continue</p>
            </div>
        </div>

        <!-- Right form panel -->
        <div class="card-right">
            <div class="form-wrapper">
                <h2 class="form-title">Login</h2>
                <p class="form-subtitle">Welcome back! Please login to your account</p>

                <!-- Login form (only email + password) -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="username@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <div class="signup-link">New User? <a href="register.html">Signup</a></div>

                <div id="messageBox" class="message-box"></div>
            </div>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
